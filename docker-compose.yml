# docker-compose.yml
# This file defines all the services (containers) our project needs.
# Run everything with: docker-compose up
# Stop everything with: docker-compose down

#version: "3.9"   # which version of docker-compose syntax we're using

services:         # "services" is docker-compose's word for containers

  # ─────────────────────────────────────────
  # ZOOKEEPER — Kafka needs this to run.
  # Think of it as Kafka's manager/coordinator.
  # You don't interact with it directly, it just needs to exist.
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    # "image" means: download this pre-built container from Docker Hub.
    # We're using Confluent's official Zookeeper image, version 7.4.0.
    # You don't write this image — it's like pip installing a library.
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      # environment variables are like settings passed into the container.
      # Zookeeper listens on port 2181 by default.
      ZOOKEEPER_TICK_TIME: 2000
      # heartbeat interval in milliseconds — how often Zookeeper checks health.

  # ─────────────────────────────────────────
  # KAFKA — our message broker / streaming backbone.
  # Producers send events TO Kafka topics.
  # Consumers read events FROM Kafka topics.
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
      # Kafka won't start until Zookeeper is running.
      # docker-compose respects this order.
    ports:
      - "9092:9092"
      # format is "host_port:container_port"
      # your Python code on the HOST machine connects via localhost:9092
      # inside Docker, Kafka listens on container port 9092
    environment:
      KAFKA_BROKER_ID: 1
      # unique ID for this Kafka broker (we only have one)
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # tells Kafka where Zookeeper is. "zookeeper" here is the
      # service name above — docker-compose creates DNS so containers
      # can find each other by service name.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # the address Kafka tells clients to connect to
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # replication = how many copies of data to keep.
      # in production you'd use 3. We use 1 (no copies) for local dev.

  # ─────────────────────────────────────────
  # REDIS — our feature store (fast in-memory key-value store).
  # We store transformed features here so the model can
  # retrieve them in milliseconds during inference.
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    # "alpine" = a very small Linux distro. Keeps image size tiny.
    ports:
      - "6379:6379"
      # Redis default port. Your Python code connects to localhost:6379.
    command: redis-server --appendonly yes
    # "command" overrides the default start command of the container.
    # --appendonly yes = persist data to disk (survives container restarts)
    volumes:
      - redis_data:/data
      # "volumes" = attach persistent storage to the container.
      # Without this, all Redis data vanishes when container stops.
      # "redis_data" is a named volume defined at the bottom of this file.

  # ─────────────────────────────────────────
  # MLFLOW — tracks experiments, stores models, acts as model registry.
  # Think of it as GitHub but for ML experiments and models.
  # ─────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    # breaking this down:
    # mlflow server        → start the MLflow tracking server
    # --host 0.0.0.0       → listen on all network interfaces
    #                        (0.0.0.0 means "accept connections from anywhere")
    #                        If you use 127.0.0.1, only the container itself can connect
    # --backend-store-uri  → where to store run metadata (we use SQLite, a file-based DB)
    # --default-artifact-root → where to store model files, plots, etc.
    volumes:
      - mlflow_data:/mlflow
      # persists the SQLite DB and model artifacts across restarts
  
  
  # docker-compose.yml — add these after your existing services

  # ─────────────────────────────────────────
  # AIRFLOW DATABASE — stores DAG runs, task states, logs
  # Airflow needs a proper database (not SQLite) for production
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────
  # AIRFLOW WEBSERVER — the UI at localhost:8080
  # ─────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # LocalExecutor = run tasks in subprocesses on same machine
      # in production you'd use CeleryExecutor or KubernetesExecutor
      
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      # tells Airflow where its metadata database is
      # format: dialect+driver://user:password@host/dbname
      
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      # Fernet key = used to encrypt sensitive data in the DB (passwords etc.)
      # in production generate a real one: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      # don't load Airflow's built-in example DAGs — keeps UI clean
      
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # pass our service config to Airflow tasks
      
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      # mount our local dags/ folder into the container
      # any .py file we put in airflow/dags/ appears in the Airflow UI
      - ./model:/opt/airflow/model
      # mount our model folder so the DAG can run train.py
    ports:
      - "8080:8080"
    command: webserver
    # start the web UI

  # ─────────────────────────────────────────
  # AIRFLOW SCHEDULER — actually runs the DAGs
  # separate from webserver so UI stays responsive during heavy runs
  # ─────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.1
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./model:/opt/airflow/model
    command: scheduler
    # runs the scheduler process (separate from webserver)

# ─────────────────────────────────────────
# VOLUMES — named persistent storage blocks.
# Docker containers are ephemeral by default (data lost on stop).
# Volumes survive container restarts.
# ─────────────────────────────────────────
volumes:
  redis_data:    # referenced by the redis service above
  mlflow_data:   # referenced by the mlflow service above
  postgres_data: # referenced by the postgres service above
  